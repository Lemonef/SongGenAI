{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Sign Out" %} — SongGenAI{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-6 py-12 gradient-hero">
  <div class="max-w-md w-full text-center">
    <div class="card rounded-3xl p-10 glow-purple backdrop-blur-xl">
      <div class="w-16 h-16 rounded-2xl bg-red-500/10 flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8 text-red-400" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/>
        </svg>
      </div>
      
      <h1 class="text-3xl font-bold mb-4">Sign Out</h1>
      <p class="text-gray-400 mb-8 text-lg">Are you sure you want to sign out of SongGenAI?</p>

      <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        {% if redirect_field_value %}
          <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
        {% endif %}
        
        <div class="flex flex-col gap-4">
          <button type="submit" class="w-full btn-primary py-4 rounded-2xl font-bold text-lg">
            Yes, Sign Me Out
          </button>
          <a href="/" class="text-gray-400 hover:text-white font-medium transition-colors">
            Actually, keep me in
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
