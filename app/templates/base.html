<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SongGenAI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { background: #07070f; }
    .gradient-hero { background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124,58,237,0.25) 0%, transparent 70%); }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(124,58,237,0.2); }
    .card:hover { background: rgba(255,255,255,0.07); border-color: rgba(167,139,250,0.4); }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #6d28d9); transition: all .2s; }
    .btn-primary:hover { background: linear-gradient(135deg, #8b5cf6, #7c3aed); box-shadow: 0 0 24px rgba(124,58,237,0.5); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .glow-purple { box-shadow: 0 0 40px rgba(124,58,237,0.3); }
    @keyframes equalizer { 0%,100%{transform:scaleY(.3)} 50%{transform:scaleY(1)} }
    .eq-bar { animation: equalizer 1s ease-in-out infinite; transform-origin: bottom; }
    .eq-bar:nth-child(1){animation-delay:0s}
    .eq-bar:nth-child(2){animation-delay:.15s}
    .eq-bar:nth-child(3){animation-delay:.3s}
    .eq-bar:nth-child(4){animation-delay:.45s}
    .eq-bar:nth-child(5){animation-delay:.6s}
    .eq-bar:nth-child(6){animation-delay:.75s}
    @keyframes spin-slow { to { transform: rotate(360deg); } }
    .spin-slow { animation: spin-slow 8s linear infinite; }
    .nav-link { position: relative; }
    .nav-link::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:2px; background:#7c3aed; transition:.2s; }
    .nav-link:hover::after { width:100%; }
    .nav-link.active::after { width:100%; }
    input, select, textarea {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(124,58,237,0.3);
      color: white;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    select option { background: #1a0a2e; color: white; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #07070f; }
    ::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 3px; }
    audio { width: 100%; }
    audio::-webkit-media-controls-panel { background: rgba(124,58,237,0.2); }
    .status-badge { font-size: .7rem; letter-spacing: .05em; font-weight: 600; }
    @keyframes pulse-ring { 0%{transform:scale(.95);box-shadow:0 0 0 0 rgba(124,58,237,.7)} 70%{transform:scale(1);box-shadow:0 0 0 10px rgba(124,58,237,0)} 100%{transform:scale(.95);box-shadow:0 0 0 0 rgba(124,58,237,0)} }
    .pulse-ring { animation: pulse-ring 2s infinite; }
  </style>
</head>
<body class="text-white min-h-screen font-sans antialiased">

  <!-- Navigation -->
  <nav class="sticky top-0 z-50 border-b border-purple-900/20" style="background:rgba(7,7,15,0.85);backdrop-filter:blur(20px)">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5 group">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center btn-primary">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
            <path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"/>
          </svg>
        </div>
        <span class="font-bold text-lg">SongGen<span class="text-violet-400">AI</span></span>
      </a>
      <div class="flex items-center gap-8 text-sm font-medium text-gray-400">
        <a href="/" class="nav-link hover:text-white transition-colors {% block nav_home %}{% endblock %}">Home</a>
        {% if user.is_authenticated %}
          <a href="/browse/" class="nav-link hover:text-white transition-colors {% block nav_browse %}{% endblock %}">Browse</a>
          {% if user.profile.is_creator %}
            <a href="/generation/" class="nav-link hover:text-white transition-colors {% block nav_generate %}{% endblock %}">Generate</a>
          {% endif %}
          <a href="/manager/" class="nav-link hover:text-white transition-colors {% block nav_library %}{% endblock %}">Library</a>
          <a href="/accounts/logout/" class="px-4 py-1.5 rounded-lg border border-purple-800/60 text-gray-400 hover:text-white hover:border-purple-600 transition-all text-xs">Sign Out</a>
        {% else %}
          <a href="/accounts/google/login/" class="btn-primary px-4 py-2 rounded-lg text-white text-xs font-semibold flex items-center gap-2">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#fff"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#fff"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff"/></svg>
            Sign in with Google
          </a>
        {% endif %}
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="mt-24 border-t border-purple-900/20 py-10">
    <div class="max-w-6xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-4 text-gray-600 text-sm">
      <div class="flex items-center gap-2">
        <div class="w-5 h-5 rounded flex items-center justify-center btn-primary opacity-70">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"/></svg>
        </div>
        <span>SongGenAI — AI-powered music generation</span>
      </div>
      <span>Built with Django & Suno AI</span>
    </div>
  </footer>

  <!-- Global Audio Player -->
  <div x-data="globalPlayer" x-show="currentSong" x-cloak
       class="fixed bottom-0 left-0 right-0 z-[60] bg-[#0c0c16]/95 backdrop-blur-xl border-t border-purple-900/30 px-6 py-4 transition-all transform"
       x-transition:enter="translate-y-full" x-transition:enter-end="translate-y-0"
       x-transition:leave="translate-y-0" x-transition:leave-end="translate-y-full">
    <div class="max-w-6xl mx-auto flex items-center justify-between gap-6">
      <!-- Song Info -->
      <div class="flex items-center gap-4 w-1/4">
        <div class="w-12 h-12 rounded-xl btn-primary flex items-center justify-center glow-purple flex-shrink-0">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"/></svg>
        </div>
        <div class="min-w-0">
          <p class="font-bold truncate text-sm" x-text="currentSong?.title"></p>
          <p class="text-gray-500 text-xs truncate" x-text="'by ' + currentSong?.creator_name"></p>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex flex-col items-center gap-2 flex-1 max-w-xl">
        <div class="flex items-center gap-6">
          <button @click="togglePlay" class="w-12 h-12 rounded-full btn-primary flex items-center justify-center hover:scale-110 transition-transform shadow-lg group">
            <template x-if="!isPlaying">
              <svg class="w-6 h-6 text-white ml-1 opacity-90" fill="currentColor" viewBox="0 0 24 24">
                <path d="M7 6v12l10-6z"/>
              </svg>
            </template>
            <template x-if="isPlaying">
              <svg class="w-6 h-6 text-white opacity-90" fill="currentColor" viewBox="0 0 24 24">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
              </svg>
            </template>
          </button>
        </div>
        <!-- Progress Bar -->
        <div class="w-full flex items-center gap-3">
          <span class="text-[10px] text-gray-500 font-mono w-8 text-right" x-text="formatTime(currentTime)">0:00</span>
          <div class="flex-1 h-1 bg-white/10 rounded-full cursor-pointer relative group" @click="seek($event)">
            <div class="absolute top-0 left-0 h-full btn-primary rounded-full" :style="`width: ${progress}%`"></div>
            <div class="absolute top-1/2 -mt-1.5 w-3 h-3 bg-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg" :style="`left: ${progress}%`" style="margin-left: -6px;"></div>
          </div>
          <span class="text-[10px] text-gray-500 font-mono w-8 text-left" x-text="formatTime(duration)">0:00</span>
        </div>
      </div>

      <!-- Volume / Extra -->
      <div class="flex justify-end items-center gap-4 w-1/4">
        <button @click="currentSong = null" class="text-gray-500 hover:text-white transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <audio id="globalAudio" @timeupdate="updateProgress" @ended="onEnded" @loadedmetadata="onLoaded"></audio>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('globalPlayer', () => ({
        currentSong: null,
        isPlaying: false,
        currentTime: 0,
        duration: 0,
        progress: 0,

        init() {
          window.addEventListener('play-song', (e) => {
            this.play(e.detail);
          });
        },

        play(song) {
          const audio = document.getElementById('globalAudio');
          if (this.currentSong?.id === song.id && this.isPlaying) {
             this.togglePlay();
             return;
          }
          
          this.currentSong = song;
          audio.src = song.audio_url;
          audio.play();
          this.isPlaying = true;
        },

        togglePlay() {
          const audio = document.getElementById('globalAudio');
          if (audio.paused) {
            audio.play();
            this.isPlaying = true;
          } else {
            audio.pause();
            this.isPlaying = false;
          }
        },

        updateProgress(e) {
          this.currentTime = e.target.currentTime;
          this.progress = (this.currentTime / this.duration) * 100;
        },

        onLoaded(e) {
          this.duration = e.target.duration;
        },

        onEnded() {
          this.isPlaying = false;
          this.progress = 0;
          this.currentTime = 0;
        },

        seek(e) {
          const rect = e.currentTarget.getBoundingClientRect();
          const p = (e.clientX - rect.left) / rect.width;
          const audio = document.getElementById('globalAudio');
          audio.currentTime = p * this.duration;
        },

        formatTime(sec) {
          if (!sec) return '0:00';
          const m = Math.floor(sec / 60);
          const s = Math.floor(sec % 60);
          return `${m}:${s < 10 ? '0' : ''}${s}`;
        }
      }));
    });

    function getCsrf() {
      const v = document.cookie.match('(^|;)\\s*csrftoken\\s*=\\s*([^;]+)');
      return v ? v.pop() : '';
    }
  </script>
</body>
</html>
