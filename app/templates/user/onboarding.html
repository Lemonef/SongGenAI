{% extends "base.html" %}
{% block title %}Welcome — Choose Your Role{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-6 py-16 gradient-hero">
  <div class="max-w-2xl w-full">
    <div class="text-center mb-12">
      <div class="w-16 h-16 rounded-2xl btn-primary flex items-center justify-center mx-auto mb-6 glow-purple">
        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"/></svg>
      </div>
      <h1 class="text-4xl font-bold mb-3">Welcome to SongGen<span class="text-violet-400">AI</span></h1>
      <p class="text-gray-400 text-lg">Hey {{ request.user.first_name|default:request.user.username }}! How do you want to use the platform?</p>
    </div>

    <form method="POST" action="/user/onboarding/">
      {% csrf_token %}
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Creator Card -->
        <button type="submit" name="role" value="creator"
          class="card rounded-2xl p-8 text-left hover:border-violet-500/60 hover:bg-white/8 transition-all group cursor-pointer">
          <div class="w-12 h-12 rounded-xl btn-primary flex items-center justify-center mb-5 group-hover:glow-purple transition-all">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/>
            </svg>
          </div>
          <h2 class="text-xl font-bold mb-2">Creator</h2>
          <p class="text-gray-500 text-sm leading-relaxed">Generate AI songs, manage your personal library, organize playlists, and publish your music to the community.</p>
          <div class="mt-6 flex items-center gap-2 text-violet-400 text-sm font-medium group-hover:gap-3 transition-all">
            Start creating
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </div>
        </button>

        <!-- Listener Card -->
        <button type="submit" name="role" value="listener"
          class="card rounded-2xl p-8 text-left hover:border-violet-500/60 hover:bg-white/8 transition-all group cursor-pointer">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center mb-5 transition-all" style="background:rgba(124,58,237,0.15)">
            <svg class="w-6 h-6 text-violet-400" fill="currentColor" viewBox="0 0 20 20">
              <path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"/>
            </svg>
          </div>
          <h2 class="text-xl font-bold mb-2">Listener</h2>
          <p class="text-gray-500 text-sm leading-relaxed">Browse and enjoy AI-generated music from creators on the platform. Discover new songs and vibe to the AI beats.</p>
          <div class="mt-6 flex items-center gap-2 text-violet-400 text-sm font-medium group-hover:gap-3 transition-all">
            Start listening
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </div>
        </button>

      </div>
    </form>
  </div>
</div>
{% endblock %}
